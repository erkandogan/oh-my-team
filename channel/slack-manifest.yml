display_information:
  name: Oh My Team
  description: Multi-agent orchestration hub for Claude Code — remote session management via Slack
  long_description: |
    Oh My Team (OMT) connects your Claude Code sessions to Slack.
    Each project gets its own thread in a channel. Send messages,
    approve permissions, and manage sessions — all from Slack.

    Part of the Oh My Team multi-agent orchestration plugin for Claude Code.

    https://ohmyteam.cc
  background_color: "#1a1a2e"
features:
  bot_user:
    display_name: Oh My Team
    always_online: true
oauth_config:
  scopes:
    bot:
      - chat:write
      - channels:history
      - channels:read
      - groups:history
      - groups:read
      - pins:write
      - users:read
settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - message.groups
  socket_mode_enabled: true
  org_deploy_enabled: false
  token_rotation_enabled: false
